apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-ingress
  namespace: biddinggo
spec:
  ingressClassName: nginx
  rules:
    - host: jenkins.bidding-go.shop
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jenkins-external
                port:
                  number: 8080