services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped

    ports:
      - "8081:8080"
      - "50000:50000"

    environment:
      TZ: Asia/Seoul

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker

    group_add:
      - "<docker_gid>"

volumes:
  jenkins_home: